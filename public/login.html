<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-sm border border-gray-700 text-center">
        <h2 class="text-2xl font-bold text-blue-400 mb-6">Admin Login</h2>
        <input type="password" id="passInput" placeholder="Password" 
               class="w-full p-3 rounded bg-gray-700 text-white mb-4 border border-gray-600 outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold transition-all">Enter Dashboard</button>
        <p id="error" class="text-red-500 text-sm mt-4 hidden">Invalid Password</p>
    </div>

    <script>
        function login() {
            const pass = document.getElementById('passInput').value;
            // Save token to local storage
            localStorage.setItem('admin_token', pass);
            window.location.href = '/admin.html';
        }
    </script>
</body>
</html>
